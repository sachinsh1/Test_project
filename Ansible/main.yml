- name: Manage SSH access (optimized)
  hosts: all
  become: yes

  vars_files:
    - users.yml

  tasks:

    - name: Check if user exists
      ansible.builtin.getent:
        database: passwd
        key: "{{ item.name }}"
      register: user_check
      failed_when: false
      loop: "{{ users }}"

    - name: Manage SSH for valid users
      block:

        - name: Ensure .ssh directory
          ansible.builtin.file:
            path: "/home/{{ item.item.name }}/.ssh"
            state: directory
            owner: "{{ item.item.name }}"
            group: "{{ item.item.group | default('users') }}"
            mode: '0700'

        - name: Add public key
          ansible.builtin.authorized_key:
            user: "{{ item.item.name }}"
            key: "{{ lookup('file', item.item.key_file | default('keys/' + item.item.name + '.pub')) }}"
            state: present
            manage_dir: no

        - name: Fix authorized_keys permission
          ansible.builtin.file:
            path: "/home/{{ item.item.name }}/.ssh/authorized_keys"
            owner: "{{ item.item.name }}"
            group: "{{ item.item.group | default('users') }}"
            mode: '0600'

      when: item.ansible_facts.getent_passwd is defined and
            item.item.name in item.ansible_facts.getent_passwd
      loop: "{{ user_check.results }}"

    - name: Show skipped users
      debug:
        msg: "Skipping {{ item.item.name }} - user does not exist"
      when: item.ansible_facts.getent_passwd is not defined or
            item.item.name not in item.ansible_facts.getent_passwd
      loop: "{{ user_check.results }}"
